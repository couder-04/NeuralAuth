# rules/policy_rules.yaml
# =========================
# Declarative policy rules for the PolicyEngine (engines/policy_engine.py).
# Hot-reloadable via PolicyEngine.reload_yaml() -- no code changes needed
# to add, remove, or re-prioritize a rule.
#
# Each rule:
#   name       unique identifier
#   priority   higher wins ties (see PolicyEngine.resolve_conflicts)
#   when       conditions (field_<op>: value), ANDed together
#   action     one of ALLOW | VOICE_CHALLENGE | OTP | VOICE_AND_OTP |
#              MANUAL_REVIEW | REJECT
#   reason     human-readable explanation surfaced in the audit trail
#
# This is the same rule set previously hardcoded as _DEFAULT_RULES in
# engines/policy_engine.py, now externalized per the M0 cleanup item
# ("shared constants... version information").

- name: RejectCriticalRisk
  priority: 100
  when:
    risk_level_eq: CRITICAL
  action: REJECT
  reason: Risk Engine flagged this transaction as CRITICAL risk.
- name: RejectLowTrust
  priority: 100
  when:
    trust_score_lt: 0.2
  action: REJECT
  reason: Trust score is below the minimum acceptable threshold.
- name: ManualReviewRepeatedFailures
  priority: 90
  when:
    failed_attempts_gte: 3
  action: MANUAL_REVIEW
  reason: Three or more failed authentication attempts.
- name: HighRiskTransaction
  priority: 80
  when:
    risk_level_eq: HIGH
  action: VOICE_AND_OTP
  reason: High transaction risk requires strong authentication.
- name: LowConfidencePrediction
  priority: 70
  when:
    confidence_lt: 0.4
  action: VOICE_AND_OTP
  reason: Authentication Network confidence is too low to trust alone.
- name: NewBeneficiary
  priority: 60
  when:
    beneficiary_type_eq: NEW
  action: VOICE_AND_OTP
  reason: Transfers to a new beneficiary require strong authentication.
- name: LargeTransaction
  priority: 50
  when:
    transaction_amount_gt: 100000
  action: OTP
  reason: Amount exceeds the bank's standard threshold.
- name: UnfamiliarLocation
  priority: 40
  when:
    location_familiarity_eq: UNFAMILIAR
  action: OTP
  reason: Transaction originates from an unfamiliar location.
- name: LowIntentConfidence
  priority: 30
  when:
    intent_confidence_lt: 0.6
  action: VOICE_CHALLENGE
  reason: Intent Engine is not confident about the transaction purpose.
- name: OddHourActivity
  priority: 20
  when:
    time_familiarity_eq: ODD_HOUR
  action: VOICE_CHALLENGE
  reason: Transaction occurs at an unusual hour for this user.
- name: TrustedUser
  priority: 10
  when:
    trust_score_gte: 0.9
  action: ALLOW
  reason: High trust score; no additional friction required.

